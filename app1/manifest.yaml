apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec: 
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: frontend
  template:
    metadata:
      name: frontend
      labels:
        project: roboshop
        tier: frontend
        component: frontend
    spec:
      containers:
        - name: app1
          image: happielearning/app1:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    project: roboshop
    tier: frontend
    component: frontend
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port